prompt = "Generate Mukitul Islam Mukit's daily social media drafts and deliver them directly in this Codex chat.\n\nOutput only the final deliverable. Do not include commentary, JSON, tables, tool-use notes, scheduling details, humanizer audit notes, draft rewrites, or generated image attachments.\n\nGenerate exactly 3 social post drafts for today in Asia/Dhaka timezone.\n\nMukit is a Senior Software Engineer with 9+ years of experience based in Dhaka, Bangladesh. He is growing his LinkedIn and X/Twitter presence to attract remote or Dhaka hybrid Senior/Staff Software Engineer opportunities and connect with senior engineers, startup CTOs, and hiring managers.\n\nHis voice:\n- casual, practical, sharp\n- senior engineer talking to peers\n- specific examples over generic advice\n- real engineering judgment\n- opinionated but fair tradeoffs\n- first-person perspective where useful\n- occasional Dhaka/Bangladesh tech context when natural\n- no corporate buzzword tone\n- no AI-ish phrasing\n- no markdown tables\n- no emojis unless genuinely natural, and default to none. only can use ✅, ⏳, or ❌ when suitable.\n- no em dashes or en dashes\n\nTech/persona anchors:\nTypeScript, JavaScript, React, Next.js, Node.js, GraphQL, PostgreSQL, Redis, AWS, GCP, Docker, CI/CD, AI/LLM tools, system design, debugging, mentoring, remote work, SaaS building, Bangladesh tech scene.\n\nGenerate:\n- Post 1: deep technical / educational\n- Post 2: career / personal brand\n- Post 3: hot take, debugging story, behind-the-scenes, or engagement bait\n\nImage prompt generation:\n- Do not generate actual images.\n- For each post, generate one single combined image-generation prompt that can be copied into an AI image generation input box.\n- Each combined image-generation prompt must instruct the image generator to create 3 separate downloadable images from 3 distinct sub-prompts.\n- Generate exactly 3 image sub-prompts inside each combined prompt, for 9 image concepts total across the full deliverable.\n- Put each combined image-generation prompt in one fenced code block using ```text.\n- Do not put the 3 image sub-prompts in separate fenced code blocks. They must all live inside the single combined prompt block for that post.\n- Each image sub-prompt should be self-contained and include: intended platform use, subject, composition, mood, style/medium, color palette, aspect ratio, and clear avoid constraints.\n- Each combined prompt should be specific enough to produce three usable images without additional context.\n- Each image should be suitable for LinkedIn and X/Twitter.\n- Generate genuinely different visual treatments inside each combined prompt. Do not produce three versions of the same abstract concept with minor color or object changes.\n- Prefer clean, modern, technical visuals that look credible for a senior software engineer audience.\n- Avoid generic stock-photo vibes, fake UI text, unreadable code walls, exaggerated AI visuals, cheesy corporate illustrations, default abstract network graphics, floating icons, glowing brains, robotic hands, and heavy text inside the image.\n- When useful, include Dhaka/Bangladesh context subtly, such as a desk setup, city light, local work rhythm, or startup engineering scene, without making it touristy.\n- Recommended aspect ratios: 16:9 for LinkedIn, 16:9 for X/Twitter.\n\nImage prompt variation constraints:\n- Image Prompt 1 must be a hand-written visual summary of the post: a clean notebook, whiteboard, or paper sketch that turns the post's main idea into handwritten headings, arrows, underlines, simple diagrams, checklists, tiny UI sketches, sticky notes, and highlighted phrases. It should feel like a senior engineer explaining an idea on paper after thinking it through. Allow short readable text, but keep it concise and exact, with no dense paragraphs.\n- Image Prompt 2 must be a poster-style split composition: strong quote or one-line takeaway on one side, relevant image or scene on the other side. Use a crisp editorial layout, generous whitespace, premium typography, and a credible engineering/startup/work context. The text side should contain only one short quote or takeaway from the post, not a full paragraph.\n- Image Prompt 3 must be a realistic/editorial or concrete technical scene, different from the first two: an engineer's desk, architecture sketching session, debugging setup, terminal-and-notebook workflow, system diagram review, mentoring moment, or startup engineering work scene. Make it specific to the post's lesson and Mukit's persona. Use abstract metaphor only when it is clearly grounded in a physical object or real workflow.\n- Across the 3 image sub-prompts for a post, vary medium, layout, camera angle, and energy: hand-drawn explainer, designed poster, and realistic/editorial scene.\n- Do not ask for Mukit's face unless an actual reference image is provided.\n- Do not imply company logos, private dashboards, confidential data, or real screenshots unless provided.\n- Avoid large readable text in the image. If text is necessary, keep it short and specify exact text. For handwritten or poster images, specify the exact short phrases to render and ask for all other marks to be abstract scribbles or non-readable notes.\n- Do not generate sub-prompt text that depends on reading the social post from another context. Each image sub-prompt must stand alone.\n\nUse this weekly rotation:\nMonday: Architecture + Career + Hot take\nTuesday: AWS/DevOps + SaaS lessons + Debugging story\nWednesday: AI/Agentic tools + Mentoring + Tech opinion\nThursday: System design + Remote work + Industry take\nFriday: Career growth + Debugging + Weekend reflection\nSaturday: Personal project / side project update + Tech prediction + Casual\nSunday: Weekly roundup / curated insight + Learning + Engagement question\n\nOptional freshness:\nIf web access is available and cheap, briefly check current tech context/news for inspiration around Node.js, PostgreSQL, React.js, system design, startups, AI/agentic tools, or software engineering career topics. Do not make the post a news summary unless the day's topic naturally calls for it. The primary output is evergreen personal-brand content.\n\nEach post must include:\n- LinkedIn version, preferably 800-1500 characters\n- Twitter/X version, max 280 characters\n- 3-5 relevant hashtags for LinkedIn inside the LinkedIn code block\n- 0-2 hashtags for Twitter/X inside the X code block\n- 1 combined copy/paste-ready image-generation prompt containing 3 separate image sub-prompts\n\nLinkedIn constraints:\n- Strong hook in the first 1-3 lines\n- Short paragraphs\n- Bullets are allowed, but no markdown tables\n- End with a question or lightweight CTA\n- Include 3-5 relevant hashtags\n- Sound like a real senior engineer, not a brand marketer\n\nTwitter/X constraints:\n- Max 280 characters\n- Sharp and opinionated\n- One clear takeaway\n- 1-2 hashtags max if useful\n- No threads unless explicitly marked THREAD, but default should be a single tweet\n\nMandatory humanizer pass:\nUse the $humanizer skill instructions from /Users/mukit/.agents/skills/humanizer/SKILL.md internally before finalizing the social post text. Apply it to the LinkedIn and X drafts, titles, topics, and any prose in image prompts.\n\nRun the humanizer process silently:\n1. Draft the content.\n2. Audit it for obvious AI-generated patterns: inflated significance, promotional filler, vague attribution, rule-of-three padding, fake-candid openers, signposting, staccato drama, aphorism formulas, generic upbeat endings, excessive hedging, passive voice where active voice is clearer, and AI vocabulary.\n3. Rewrite until it sounds like a real senior engineer wrote it.\n4. Do not output the draft rewrite, audit bullets, \"What makes this AI generated\" notes, or change summary. Output only the final cleaned deliverable in the required structure.\n\nHumanizer constraints to apply while composing:\nAvoid words and patterns like \"delve\", \"pivotal\", \"testament\", \"underscores\", \"landscape\", \"in today's fast-paced world\", \"groundbreaking\", \"vibrant\", \"must-visit\", vague attributions, excessive hedging, corporate buzzword salad, generic positive endings, sycophantic tone, rule-of-three padding, fake-candid openers like \"Honestly?\" or \"Real talk\", and signposting like \"let's dive in\".\n\nPrefer:\n- specific engineering details\n- realistic examples\n- varied rhythm\n- practical advice\n- clear tradeoffs\n- simple words where they work\n- active voice\n- enough personality to sound human, without forcing punchlines\n\nFinal delivery format requirements:\n- Keep the output clean, compact, and easy to scan.\n- Do not use decorative separator lines.\n- Do not repeat long labels or explanations.\n- Put every LinkedIn post in its own fenced code block so it can be copied directly.\n- Put every Twitter/X post in its own fenced code block so it can be copied directly.\n- Put each post's combined image-generation prompt in exactly one fenced code block so it can be copied directly.\n- The combined image-generation prompt must begin with: \"Generate 3 separate downloadable images based on the prompts below:\"\n- Inside the combined prompt, label the sub-prompts exactly as \"Image Prompt 1\", \"Image Prompt 2\", and \"Image Prompt 3\".\n- Do not place image sub-prompts in separate code blocks.\n- Put hashtags inside the relevant social post code block, not outside it.\n- Keep the image section label minimal: Combined image prompt.\n- Do not include generated images or image attachment placeholders.\n\nBefore finalizing, silently verify:\n- the $humanizer skill process has been applied internally\n- no humanizer draft, audit, or change summary is included in the output\n- exactly 3 posts\n- each post has a LinkedIn draft and a Twitter/X draft\n- each post has exactly 1 combined image-generation prompt block\n- each combined image-generation prompt contains exactly 3 labeled image sub-prompts\n- every LinkedIn draft is inside a fenced code block\n- every Twitter/X draft is inside a fenced code block\n- every combined image-generation prompt is inside its own single fenced code block\n- no individual separate code blocks for Image Prompt 1, Image Prompt 2, or Image Prompt 3\n- each Twitter/X draft is within 280 characters\n- LinkedIn hashtags count is 3-5\n- no markdown tables\n- no em dashes or en dashes\n- no generated image attachment placeholders\n- Image Prompt 1 follows the handwritten explainer/summary style\n- Image Prompt 2 follows the split poster style with text on one side and image/scene on the other\n- Image Prompt 3 is a realistic/editorial or concrete technical scene, not a default abstract visual\n- the three image prompts for each post are meaningfully different from each other\n\nUse this exact structure:\n\n# Daily social drafts\nDate: [today's date]\nDay: [today's day]\n\n## Post 1: [title]\nTopic: [topic/theme]\n\n### LinkedIn\n```text\n[LinkedIn post content]\n\n[3-5 hashtags]\n```\n\n### X\n```text\n[Twitter/X post text, max 280 chars]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```\n\n## Post 2: [title]\nTopic: [topic/theme]\n\n### LinkedIn\n```text\n[LinkedIn post content]\n\n[3-5 hashtags]\n```\n\n### X\n```text\n[Twitter/X post text, max 280 chars]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```\n\n## Post 3: [title]\nTopic: [topic/theme]\n\n### LinkedIn\n```text\n[LinkedIn post content]\n\n[3-5 hashtags]\n```\n\n### X\n```text\n[Twitter/X post text, max 280 chars]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```"
