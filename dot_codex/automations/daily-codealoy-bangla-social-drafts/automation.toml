prompt = "Generate Codealoy's daily Bangla social media drafts and deliver them directly in this Codex chat.\n\nOutput only the final deliverable. Do not include commentary, JSON, tables, tool-use notes, scheduling details, humanizer audit notes, draft rewrites, or generated image attachments.\n\nGenerate exactly 3 original social post drafts for today in Asia/Dhaka timezone, written in Bangla (Bengali).\n\nHard language requirement:\n- All generated social copy must be in Bangla/Bengali.\n- This applies to every platform version: Facebook page, Facebook group, LinkedIn page, and X/Twitter.\n- Titles, topics, hooks, CTAs, hashtags context, and image-prompt prose must stay Bangla-first.\n- Do not write a LinkedIn post or any other platform draft in English.\n- If any draft naturally starts turning English-first, rewrite it into clear Bangla before final output.\n- In the post content draft, English is allowed only for these: URLs, hashtags, and these words list: [CLI, VS Code, Cursor, Claude Code, Codex, AI].\n- The \"Combined image prompt\" section must be in full English.\n\nThe drafts should support Codealoy's mission and be suitable to adapt for these platforms:\n- Facebook page\n- Facebook group\n- LinkedIn page\n- X/Twitter\n\nProject context:\nCodealoy is a free and open-source platform for learning agentic AI development in Bangla (Bengali).\nWebsite: https://www.codealoy.com\nGitHub: https://github.com/codealoy/codealoy\n\nMission:\nBuild the first complete, trustworthy Bangla knowledge base for the AI-native era of software engineering, so Bengali-speaking developers can learn to build with AI agents without English being the barrier.\n\nCore positioning:\n- Text-first and hands-on, not video-led.\n- Watching tutorials teaches you to watch. Agentic engineering is learned by doing.\n- Learners bring their own agent and work in real tools such as VS Code, Cursor, Claude Code, or Codex.\n- There is no browser sandbox because orchestrating an AI agent in a real local environment is the actual skill.\n- The Codealoy CLI verifies completed tasks locally and returns an instant pass/fail report.\n- Code stays on the learner's machine.\n- Every task is a real project and can become a portfolio-ready GitHub repo.\n- AI tooling changes fast, so text and open source content can stay current faster than video courses.\n- Community contribution matters because the project is open source.\n\nVoice:\n- clear, practical Bangla\n- warm but not fluffy\n- grounded in real developer workflow\n- encouraging without sounding like an ad\n- specific examples over generic inspiration\n- confident, trustworthy, community-minded\n- accessible to Bengali-speaking developers learning AI-native software engineering\n- avoid corporate marketing tone\n- avoid AI-ish phrasing\n- no markdown tables\n- no emojis unless genuinely natural, and default to none\n- no em dashes or en dashes\n\nTopic variation system:\n- Each daily batch must contain 3 posts from 3 different topic families.\n- Do not make all 3 posts orbit the same idea, metaphor, checklist, or CTA.\n- Do not make more than 1 post in a daily batch mainly about giving AI context, CLI verification, or learning notes unless the weekday brief explicitly asks for that as the main theme.\n- If recent generated posts are visible in this thread, avoid repeating the main topic families from the previous 2 days.\n- Prefer concrete developer situations over broad advice. Each post should feel like it belongs to a different audience moment: learning, building, reviewing, contributing, discussing, reflecting, or showing proof of work.\n- Vary the content format across the 3 posts. Use combinations such as practical mini-lesson, anti-pattern, real workflow scenario, community question, small challenge, open-source contribution prompt, portfolio/career angle, behind-the-scenes note, or mission/philosophy post.\n\nTopic families to rotate:\n1. Agentic workflow basics: work breakdown, task boundaries, handoff to AI, reading diffs, keeping control.\n2. Prompting and context engineering: good context, bad context, examples, constraints, expected behavior.\n3. Reviewing AI output: reading generated code, spotting risky changes, asking AI to explain, comparing intent vs diff.\n4. Debugging with AI: error messages, failing checks, narrowing bugs, reproducing issues, using AI as debugging partner.\n5. Local verification: CLI checks, tests, pass/fail reports, why local environment matters, avoiding blind trust.\n6. Portfolio projects: turning small Codealoy tasks into GitHub repos, commit history, README, project explanation.\n7. Beginner learning path: what to learn first, how to start without overwhelm, first week of agentic development.\n8. Open-source contribution: fixing typos, improving lessons, adding examples, reviewing issues, beginner-friendly contribution paths.\n9. Bangla knowledge-base mission: why Bangla content matters, not just translation, local examples, community language.\n10. Text-first learning: why written lessons age better than videos for fast-changing AI tooling.\n11. Tool workflow: practical use of VS Code, Cursor, Claude Code, Codex, terminal, GitHub, without hype.\n12. Mistakes and anti-patterns: over-broad prompts, letting AI rewrite too much, skipping review, accepting confident wrong code.\n13. Real developer scenarios: fixing a form bug, improving validation, writing README, refactoring a component, handling tests.\n14. Career and interview angle: explaining AI-assisted work, showing verification, building proof of skill, talking about process.\n15. Community questions: polls, discussion prompts, first-check questions, places learners get stuck.\n16. Build-in-public updates: Codealoy progress, lesson ideas, contribution needs, behind-the-scenes notes, only with verified facts.\n17. Maintainer mindset: thinking like someone responsible for code quality while using AI.\n18. Reading and docs: using AI to understand docs, summarize errors, compare APIs, while still checking source behavior.\n19. Git and change hygiene: small commits, reading diffs, branches, PR descriptions, commit messages, rollback thinking.\n20. Weekly reflection: recapping what was learned, inviting attempts, failures, and small wins.\n\nGenerate:\n- Post 1, Post 2, and Post 3 must each use a different topic family from the list above.\n- At least 1 post should be practical and hands-on.\n- At least 1 post should invite community response or contribution.\n- At least 1 post should expand Codealoy's mission, learning philosophy, career value, portfolio value, or maintainer mindset beyond a narrow prompting/checking tip.\n- Do not use the old fixed pattern of Post 1 = concept, Post 2 = community motivation, Post 3 = CTA unless today's topics genuinely call for it.\n\nImage prompt generation:\n- Do not generate actual images.\n- For each post, generate one single combined image-generation prompt that can be copied into an AI image generation input box.\n- Each combined image-generation prompt must instruct the image generator to create 3 separate downloadable images from 3 distinct sub-prompts.\n- Generate exactly 3 image sub-prompts inside each combined prompt, for 9 image concepts total across the full deliverable.\n- Put each combined image-generation prompt in one fenced code block using ```text.\n- Do not put the 3 image sub-prompts in separate fenced code blocks. They must all live inside the single combined prompt block for that post.\n- Each image sub-prompt should be self-contained and include: intended platform use, subject, composition, mood, style/medium, color palette, aspect ratio, and clear avoid constraints.\n- Each combined prompt should be specific enough to produce three usable images without additional context.\n- Each image should be suitable for Facebook page, Facebook group, LinkedIn page, and X/Twitter.\n- Generate genuinely different visual treatments inside each combined prompt. Do not produce three versions of the same abstract concept with minor color or object changes.\n- Prefer clean, modern, credible technical visuals for Bengali-speaking software developers learning AI agent workflows.\n- Avoid generic stock-photo vibes, fake UI text, unreadable code walls, exaggerated AI visuals, cheesy corporate illustrations, overused robot imagery, glowing brains, default abstract network graphics, floating icons, and heavy text inside the image.\n- When useful, include Bangladesh or Bangla developer context subtly, such as a real desk setup, local learning group energy, Dhaka work rhythm, Bangla notes on paper, terminal/editor mood, open-source contribution scene, portfolio repo cleanup, maintainer review, or pair-learning session, without making it touristy.\n- Recommended aspect ratios: 16:9 for all social post images.\n- Do not ask for real Codealoy screenshots, logos, brand assets, private dashboards, contributor faces, or exact website UI unless they are provided in the future.\n- Avoid large readable text in the image. If text is necessary, keep it short and specify exact text such as \"Codealoy\" or a short Bangla phrase. For handwritten or poster images, specify the exact short phrases to render and ask for all other marks to be abstract scribbles or non-readable notes.\n\nImage prompt variation constraints:\n- Image Prompt 1 must be a hand-written visual summary of the post: a clean notebook, whiteboard, or paper sketch that turns the post's main idea into handwritten Bangla headings, arrows, underlines, simple diagrams, CLI/checklist notes, tiny editor or terminal sketches, sticky notes, and highlighted phrases. It should feel like a Bangla-speaking senior developer explaining an agentic engineering idea on paper after trying it in a real project. Allow short readable Bangla or English technical terms, but keep them concise and exact, with no dense paragraphs.\n- Image Prompt 2 must be a poster-style split composition: strong Bangla quote or one-line takeaway on one side, relevant developer image or scene on the other side. Use a crisp editorial layout, generous whitespace, premium typography, and a credible Codealoy-adjacent learning/open-source context such as a laptop, notebook, VS Code-like editor, GitHub-style contribution flow, local CLI verification, portfolio repo review, or Bangla developer study desk. The text side should contain only one short quote or takeaway from the post, not a full paragraph.\n- Image Prompt 3 must be a realistic/editorial or concrete technical scene, different from the first two: a Bangla developer's desk, agent workflow in a local editor, CLI pass/fail verification setup, GitHub project review, pair-learning session, architecture sketching, maintainer review, debugging session, docs reading, or open-source contribution moment. Make it specific to the post's lesson and Codealoy's mission. Use abstract metaphor only when it is clearly grounded in a physical object or real developer workflow.\n- Across the 3 image sub-prompts for a post, vary medium, layout, camera angle, and energy: hand-drawn explainer, designed poster, and realistic/editorial scene.\n- Do not imply official logos, private screenshots, confidential data, real people, or real events unless verified or provided.\n- Do not generate sub-prompt text that depends on reading the social post from another context. Each image sub-prompt must stand alone.\n\nUse this weekly rotation:\nMonday: agentic workflow basics + beginner learning habit + practical small challenge\nTuesday: prompting/context engineering + mistakes/anti-patterns + community question\nWednesday: reviewing AI output + portfolio project value + Git/change hygiene\nThursday: local development/tool workflow + open-source contribution + maintainer mindset\nFriday: debugging with AI + career/interview angle + weekly reflection\nSaturday: beginner-friendly learning path + real developer scenario + learner discussion\nSunday: Bangla knowledge-base mission + text-first learning + community contribution/weekly roundup\n\nOptional freshness:\nIf web access is available and cheap, briefly check Codealoy's website or GitHub for current project context before drafting. Use current details only if verified. Do not invent releases, metrics, contributors, roadmap items, or announcements.\n\nEach post must include:\n- Facebook page version, preferably 500-1200 Bangla characters\n- Facebook group version, preferably 400-1000 Bangla characters, more conversational and discussion-friendly\n- LinkedIn page version, preferably 700-1400 Bangla characters, professional but human\n- X/Twitter version, max 280 characters\n- 3-5 relevant hashtags for Facebook page and LinkedIn page inside their code blocks\n- 0-2 hashtags for X/Twitter inside the X code block\n- 1 combined copy/paste-ready image-generation prompt containing 3 separate image sub-prompts\n\nPlatform constraints:\nFacebook page:\n- Strong first line\n- Short paragraphs\n- Clear value for Bangla-speaking developers\n- End with a light CTA\n- Include 3-5 relevant hashtags\n\nFacebook group:\n- More conversational than the page version\n- Encourage replies, examples, questions, or sharing progress\n- Avoid sounding like a broadcast announcement\n\nLinkedIn page:\n- Strong hook in the first 1-3 lines\n- Short paragraphs\n- Professional and mission-driven\n- End with a question or lightweight CTA\n- Include 3-5 relevant hashtags\n\nX/Twitter:\n- Max 280 characters\n- One clear idea\n- Sharp and easy to share\n- 1-2 hashtags max if useful\n- No threads unless explicitly marked THREAD, but default should be a single post\n\nMandatory humanizer pass:\nUse the $humanizer skill instructions from /Users/mukit/.agents/skills/humanizer/SKILL.md internally before finalizing the social post text. Apply it to the Facebook page, Facebook group, LinkedIn page, and X drafts, titles, topics, and any prose in image prompts.\n\nRun the humanizer process silently:\n1. Draft the content.\n2. Audit it for obvious AI-generated patterns: inflated significance, promotional filler, vague attribution, rule-of-three padding, fake-candid openers, signposting, staccato drama, aphorism formulas, generic upbeat endings, excessive hedging, passive voice where active voice is clearer, and AI vocabulary.\n3. Rewrite until it sounds like a real Bangla-speaking developer/community writer wrote it.\n4. Do not output the draft rewrite, audit bullets, \"What makes this AI generated\" notes, or change summary. Output only the final cleaned deliverable in the required structure.\n\nHumanizer constraints to apply while composing:\nAvoid words and patterns like \"delve\", \"pivotal\", \"testament\", \"underscores\", \"landscape\", \"in today's fast-paced world\", \"groundbreaking\", \"vibrant\", \"must-visit\", vague attributions, excessive hedging, corporate buzzword salad, generic positive endings, sycophantic tone, rule-of-three padding, fake-candid openers, and signposting like \"let's dive in\".\n\nPrefer:\n- specific developer scenarios\n- practical Bangla explanations\n- realistic examples involving AI agents, CLI checks, code review, GitHub repos, local setup, context files, tests, verification, debugging, docs, portfolio cleanup, maintainer review, and contribution flow\n- varied rhythm\n- simple words where they work\n- active voice\n- enough personality to sound human, without forcing jokes\n\nFinal delivery format requirements:\n- Keep the output clean, compact, and easy to scan.\n- Do not use decorative separator lines.\n- Do not repeat long labels or explanations.\n- Put every platform draft in its own fenced code block so it can be copied directly.\n- Put each post's combined image-generation prompt in exactly one fenced code block so it can be copied directly.\n- The combined image-generation prompt must begin with: \"Generate 3 separate downloadable images based on the prompts below:\"\n- Inside the combined prompt, label the sub-prompts exactly as \"Image Prompt 1\", \"Image Prompt 2\", and \"Image Prompt 3\".\n- Do not place image sub-prompts in separate code blocks.\n- Put hashtags inside the relevant social post code block, not outside it.\n- Keep the image section label minimal: Combined image prompt.\n- Do not include generated images or image attachment placeholders.\n\nBefore finalizing, silently verify:\n- the $humanizer skill process has been applied internally\n- no humanizer draft, audit, or change summary is included in the output\n- exactly 3 posts\n- the 3 posts use 3 different topic families\n- no more than 1 post mainly focuses on giving AI context, CLI verification, or learning notes unless today's weekday brief explicitly requires it\n- the batch does not repeat the same dominant idea, CTA, checklist, or framing across all 3 posts\n- each post has Facebook page, Facebook group, LinkedIn page, and X drafts\n- each post has exactly 1 combined image-generation prompt block\n- each combined image-generation prompt contains exactly 3 labeled image sub-prompts\n- every platform draft is inside a fenced code block\n- every combined image-generation prompt is inside its own single fenced code block\n- no individual separate code blocks for Image Prompt 1, Image Prompt 2, or Image Prompt 3\n- each X draft is within 280 characters\n- Facebook page hashtags count is 3-5\n- LinkedIn hashtags count is 3-5\n- no markdown tables\n- no English words except the allowed list\n- no invented facts, dates, releases, metrics, contributors, or announcements\n- no generated image attachment placeholders\n- Image Prompt 1 follows the handwritten Bangla developer explainer/summary style\n- Image Prompt 2 follows the split poster style with text on one side and image/scene on the other\n- Image Prompt 3 is a realistic/editorial or concrete technical scene, not a default abstract visual\n- the three image prompts for each post are meaningfully different from each other\n\nUse this exact structure:\n\n# Codealoy daily Bangla social drafts\nDate: [today's date]\nDay: [today's day]\n\n## Post 1: [Bangla title]\nTopic: [Bangla topic/theme]\nTopic family: [one topic family from the rotation]\n\n### Facebook page\n```text\n[Facebook page post content]\n```\n\n### Facebook group\n```text\n[Facebook group post content]\n```\n\n### LinkedIn page\n```text\n[LinkedIn page post content]\n```\n\n### X\n```text\n[Twitter/X post text, max 280 chars]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```\n\n## Post 2: [Bangla title]\nTopic: [Bangla topic/theme]\nTopic family: [one topic family from the rotation]\n\n### Facebook page\n```text\n[Facebook page post content]\n```\n\n### Facebook group\n```text\n[Facebook group post content]\n```\n\n### LinkedIn page\n```text\n[LinkedIn page post content]\n```\n\n### X\n```text\n[Twitter/X post text, max 280 chars]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```\n\n## Post 3: [Bangla title]\nTopic: [Bangla topic/theme]\nTopic family: [one topic family from the rotation]\n\n### Facebook page\n```text\n[Facebook page post content]\n```\n\n### Facebook group\n```text\n[Facebook group post content]\n```\n\n### LinkedIn page\n```text\n[LinkedIn page post content]\n```\n\n### X\n```text\n[Twitter/X post text, max 280 chars]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```"
