prompt = "Generate Sobar AI's daily Bangla social media drafts and deliver them directly in this Codex chat.\n\nOutput only the final deliverable. Do not include commentary, JSON, tables, tool-use notes, scheduling details, humanizer audit notes, draft rewrites, translation notes, or generated image attachments.\n\nGenerate exactly 3 original social post drafts for today in Asia/Dhaka timezone, written for Bangladeshi Bangla-speaking small business owners, students, office workers, entrepreneurs, freelancers, and everyday AI learners.\n\nMost important language rule:\n- Do not draft in English and translate into Bangla.\n- Think, outline, and compose in Bangla from the first idea.\n- Treat Bangla as the source language, not the target language.\n- The final posts should sound like a Bangladeshi educator/community writer naturally wrote them in Bangla.\n- If any sentence feels like English sentence structure wearing Bangla words, discard that sentence and write it again from a Bangla thought.\n\nBangladeshi Bangla style guide:\n- Use modern চলিত Bangla, not সাধু ভাষা, not overly literary Kolkata-style Bangla, and not government-document Bangla.\n- Write in simple, respectful, day-to-day Bangladeshi Bangla. The audience includes beginners, so make it clear without sounding childish.\n- Prefer natural phrasing such as করুন, দেখুন, লিখুন, ভাবুন, আটকে গেলে, ভুল হলে, নিজের কাজ, চেঞ্জটা, শেখাটা, একটু চেষ্টা করে দেখুন, আগে যাচাই করুন.\n- Never use words from the বদল family in generated social copy, titles, topics, or image prompt Bangla text: বদল, বদলটা, বদলেছে, বদলানো, বদলাবেন, বদলালেন, বদলে, বদলালে. These sound unnatural for this audience. Use চেঞ্জ, চেঞ্জটা, পরিবর্তন, পাল্টেছে, ঠিক করা, এডিট করা, আপডেট করা, নতুন করে লেখা, or a more natural sentence depending on context.\n- Keep verbs and sentence flow Bangla-native. Avoid direct calques like “মূল্য প্রদান করে”, “গভীরভাবে প্রবেশ করুন”, “ল্যান্ডস্কেপ”, “যাত্রা শুরু করুন”, “পরবর্তী স্তরে নিয়ে যান”, “রূপান্তরিত করে”.\n- Use local everyday Bangladesh situations: ছোট দোকান, Facebook page inbox, customer reply, class note, assignment, office report, CV, invoice, business plan, product caption, freelancer client message, family business planning, study routine, phone/laptop use.\n- Use spoken-but-respectful rhythm. Facebook group can be more conversational. Facebook page can be polished, but still human and Bangla-first.\n- Avoid inflated mission language. Say the practical thing plainly.\n- Avoid generic motivational endings. End with a small useful action, question, or invitation.\n- Vary sentence length. Do not make every paragraph a one-line dramatic statement.\n- Avoid repetitive checklist-only structure across all posts.\n- Do not use regional dialect heavily. Keep it understandable across Bangladesh, with a light Bangladeshi feel.\n- Do not use Indian/Kolkata-leaning vocabulary when a Bangladeshi reader would usually say another word. Prefer পানি over জল, দাওয়াত over নিমন্ত্রণ only if relevant, আপা/ভাই only if natural, but do not force these.\n\nHard language requirement:\n- All generated social copy must be in Bangla/Bengali script.\n- This applies to every platform version and every post: Facebook page and Facebook group.\n- Titles, topics, hooks, CTAs, hashtags context, and any Bangla text inside image prompts must stay Bangla-first and natural.\n- The Combined image prompt section must be in full English because it is intended for an image-generation tool. Short exact Bangla text snippets inside an English image prompt are allowed only when instructing the image generator what visible Bangla text to render.\n- Do not write any post draft in English.\n- Do not write Bangla in Roman letters.\n- English is allowed inside post content only for URLs, hashtags, tool/product names, and common terms that sound natural for Bangladeshi AI learners.\n- Allowed English terms: AI, ChatGPT, Excel, Google Sheets, Facebook, Messenger, WhatsApp, Gmail, CV, PDF, invoice, prompt, copy, content, caption, inbox, post, comment, customer, freelancer, client, report, data, file.\n- Use these English terms only where genuinely natural. Prefer Bangla verbs around them, such as prompt লিখুন, report যাচাই করুন, caption বানান, inbox reply গুছিয়ে নিন, file আপলোড করুন.\n- Avoid English filler words such as output, workflow, current process, final, journey, ecosystem, landscape, leverage, unlock, boost, productivity hack, game changer.\n\nThe drafts should support Sobar AI's mission and be suitable to adapt for these platforms:\n- Facebook page: https://www.facebook.com/SobarAIOfficial/\n- Facebook group: https://www.facebook.com/groups/sobaraiofficial\n\nFacebook group name:\nসবার AI লার্নিং গ্রুপ - সহজ বাংলায় AI শিক্ষা | SobarAI.com\n\nProject context:\nSobar AI provides AI tools and education for Bangla-speaking small business owners, students, office workers, entrepreneurs, freelancers, and everyday learners.\n\nCore positioning:\n- Practical AI education in easy Bangla.\n- Useful AI guidance for real Bangladeshi contexts.\n- Help small business owners, students, office workers, entrepreneurs, and freelancers learn how to use AI safely and productively.\n- Make AI feel approachable without oversimplifying important details.\n- Focus on everyday use cases such as writing, planning, customer communication, study help, business content, research, productivity, and decision support.\n- Encourage responsible AI use, verification, privacy awareness, and human judgment.\n- Build a helpful learning community around AI education and practice.\n\nVoice:\n- clear, practical Bangla\n- friendly and approachable\n- useful before promotional\n- simple enough for beginners, but not childish\n- grounded in real-life Bangladesh use cases\n- encouraging without sounding like an ad\n- specific examples over generic inspiration\n- community-minded and trustworthy\n- avoid corporate marketing tone\n- avoid AI-ish phrasing\n- no markdown tables\n- no emojis unless genuinely natural, and default to none\n- no em dashes or en dashes\n\nGenerate:\n- Post 1: educational / conceptual, explaining one useful AI idea in Bangla\n- Post 2: practical use case for small business owners, students, office workers, entrepreneurs, freelancers, or local Bangladeshi daily work\n- Post 3: community CTA, discussion prompt, responsible AI reminder, productivity tip, product update angle, or learner motivation\n\nTopic scope:\nKeep it open for useful AI-related content, including AI education, productivity, small business workflows, students, freelancers, office work, local Bangladeshi use cases, product updates, community questions, prompt writing, verification, privacy, content creation, customer support, study workflows, and everyday productivity.\n\nUse this weekly rotation:\nMonday: AI basics + productivity habit + practical CTA\nTuesday: Prompt writing + small business use case + group discussion prompt\nWednesday: AI verification/fact-checking + student or office workflow + responsible AI reminder\nThursday: Local Bangladeshi use case + entrepreneur/freelancer workflow + community question\nFriday: Content creation/customer communication + privacy/safety angle + weekly reflection\nSaturday: Beginner-friendly learning path + behind-the-scenes/product update angle + engagement question\nSunday: Weekly AI learning roundup + practical Bangladesh examples + community discussion\n\nOptional freshness:\nIf web access is available and cheap, briefly check Sobar AI's official Facebook page or group for current project context before drafting. Use current details only if verified. Do not invent releases, metrics, events, offers, testimonials, product features, or announcements.\n\nEach post must include:\n- Facebook page version, preferably 500-1200 Bangla characters\n- Facebook group version, preferably 400-1000 Bangla characters, more conversational and discussion-friendly\n- 3-5 relevant hashtags for Facebook page inside the Facebook page code block\n- 0-3 relevant hashtags for Facebook group inside the Facebook group code block, only if natural\n- 1 combined copy/paste-ready image-generation prompt containing 3 separate image sub-prompts\n\nPlatform constraints:\nFacebook page:\n- Strong first line\n- Short paragraphs\n- Clear value for Bangla-speaking AI learners\n- Practical example or use case where useful\n- End with a light CTA\n- Include 3-5 relevant hashtags\n\nFacebook group:\n- More conversational than the page version\n- Address group members naturally\n- Encourage replies, examples, questions, sharing prompts, sharing use cases, or asking for help\n- Avoid sounding like a broadcast announcement\n- Mention the group naturally only when useful\n- Prefer natural group language such as আপনারা কী করেন, কেউ কি এমন করেছেন, কোথায় আটকাচ্ছেন, একটা উদাহরণ দিলে ভালো হয়.\n\nImage prompt generation:\n- Do not generate actual images.\n- For each post, generate one single combined image-generation prompt that can be copied into an AI image generation input box.\n- Each combined image-generation prompt must instruct the image generator to create 3 separate downloadable images from 3 distinct sub-prompts.\n- Generate exactly 3 image sub-prompts inside each combined prompt, for 9 image concepts total across the full deliverable.\n- Put each combined image-generation prompt in one fenced code block using ```text.\n- Do not put the 3 image sub-prompts in separate fenced code blocks. They must all live inside the single combined prompt block for that post.\n- Each image sub-prompt should be self-contained and include: intended platform use, subject, composition, mood, style/medium, color palette, aspect ratio, and clear avoid constraints.\n- Each combined prompt should be specific enough to produce three usable images without additional context.\n- Each image should be suitable for Facebook page and Facebook group.\n- Generate genuinely different visual treatments inside each combined prompt. Do not produce three versions of the same abstract concept with minor color or object changes.\n- Prefer clean, modern, friendly, credible visuals for Bangla-speaking AI learners.\n- Avoid generic stock-photo vibes, fake UI text, unreadable code walls, exaggerated AI visuals, cheesy corporate illustrations, overused robot imagery, glowing brains, default abstract network graphics, floating icons, and heavy text inside the image.\n- When useful, include Bangladesh or Bangla learner context subtly, such as a small shop desk, student study table, office workstation, freelancer laptop setup, Dhaka work rhythm, Bangla notes on paper, local learning group energy, or practical AI learning scene, without making it touristy.\n- Recommended aspect ratios: 16:9 for link-style Facebook posts.\n- Do not ask for real Sobar AI screenshots, logos, brand assets, private dashboards, user faces, or exact website UI unless they are provided in the future.\n- Avoid large readable text in the image. If text is necessary, keep it short and specify exact text such as \"Sobar AI\" or a short Bangla phrase. For handwritten or poster images, specify the exact short phrases to render and ask for all other marks to be abstract scribbles or non-readable notes.\n\nImage prompt variation constraints:\n- Image Prompt 1 must be a hand-written visual summary of the post: a clean notebook, whiteboard, flip chart, or paper sketch that turns the post's main idea into handwritten Bangla headings, arrows, underlines, simple diagrams, checklists, sticky notes, small phone/laptop sketches, and highlighted phrases. It should feel like a practical Bangla AI educator explaining the idea simply on paper. Allow short readable Bangla or common English AI/work terms, but keep them concise and exact, with no dense paragraphs.\n- Image Prompt 2 must be a poster-style split composition: strong Bangla quote or one-line takeaway on one side, relevant real-life image or scene on the other side. Use a crisp editorial layout, generous whitespace, friendly premium typography, and a credible everyday Bangladesh context such as a small shop counter, student desk, office report workflow, freelancer laptop setup, customer-message planning, or family business planning table. The text side should contain only one short quote or takeaway from the post, not a full paragraph.\n- Image Prompt 3 must be a realistic/editorial or concrete practical scene, different from the first two: a student using AI with handwritten class notes, a shop owner planning Facebook replies, an office worker checking an AI-drafted report, a freelancer organizing client work, a learner verifying AI output, or a small group practicing prompts together. Make it specific to the post's lesson and Sobar AI's audience. Use abstract metaphor only when it is clearly grounded in a physical object or real workflow.\n- Across the 3 image sub-prompts for a post, vary medium, layout, camera angle, and energy: hand-drawn explainer, designed poster, and realistic/editorial scene.\n- Do not imply official logos, private screenshots, confidential data, real people, real customers, or real events unless verified or provided.\n- Do not generate sub-prompt text that depends on reading the social post from another context. Each image sub-prompt must stand alone.\n\nMandatory humanizer and Bangla-native pass:\nUse the $humanizer skill instructions from /Users/mukit/.agents/skills/humanizer/SKILL.md internally before finalizing the social post text. Apply it to the Facebook page and Facebook group drafts, titles, topics, and any prose in image prompts.\n\nRun this process silently:\n1. Draft directly in Bangla from Bangla notes.\n2. Audit for obvious AI-generated patterns: inflated significance, promotional filler, vague attribution, rule-of-three padding, fake-candid openers, signposting, staccato drama, aphorism formulas, generic upbeat endings, excessive hedging, passive voice where active voice is clearer, and AI vocabulary.\n3. Audit for translation smell: English word order, abstract nouns stacked together, unnatural passive voice, too many borrowed English nouns, English idioms translated literally, Kolkata-style or overly Sanskritized words, formal report tone, and repeated checklist rhythm.\n4. Audit specifically for banned Bangla words from the বদল family. Replace them with চেঞ্জ, পরিবর্তন, পাল্টেছে, ঠিক করা, এডিট করা, আপডেট করা, নতুন করে লেখা, or a more natural sentence.\n5. Rewrite until it sounds like a real Bangladeshi educator/community writer wrote it.\n6. Do not output the draft rewrite, audit bullets, translation notes, or change summary. Output only the final cleaned deliverable in the required structure.\n\nHumanizer constraints to apply while composing:\nAvoid words and patterns like delve, pivotal, testament, underscores, landscape, in today's fast-paced world, groundbreaking, vibrant, must-visit, vague attributions, excessive hedging, corporate buzzword salad, generic positive endings, sycophantic tone, rule-of-three padding, fake-candid openers, and signposting like let's dive in.\n\nPrefer:\n- specific everyday scenarios\n- practical Bangla explanations\n- realistic examples involving small shops, Facebook pages, customer messages, class notes, office reports, CVs, invoices, business planning, content ideas, study routines, freelance work, and verification\n- varied rhythm\n- simple words where they work\n- active voice\n- enough personality to sound human, without forcing jokes\n\nFinal delivery format requirements:\n- Keep the output clean, compact, and easy to scan.\n- Do not use decorative separator lines.\n- Do not repeat long labels or explanations.\n- Put every platform draft in its own fenced code block so it can be copied directly.\n- Put each post's combined image-generation prompt in exactly one fenced code block so it can be copied directly.\n- The combined image-generation prompt must begin with: \"Generate 3 separate downloadable images based on the prompts below:\"\n- Inside the combined prompt, label the sub-prompts exactly as \"Image Prompt 1\", \"Image Prompt 2\", and \"Image Prompt 3\".\n- Do not place image sub-prompts in separate code blocks.\n- Put hashtags inside the relevant social post code block, not outside it.\n- Keep the image section label minimal: Combined image prompt.\n- Do not include generated images or image attachment placeholders.\n\nBefore finalizing, silently verify:\n- the content was composed directly in Bangla, not translated from English\n- the $humanizer skill process has been applied internally\n- no humanizer draft, audit, translation note, or change summary is included in the output\n- exactly 3 posts\n- each post has Facebook page and Facebook group drafts\n- each post has exactly 1 combined image-generation prompt block\n- each combined image-generation prompt contains exactly 3 labeled image sub-prompts\n- every platform draft is inside a fenced code block\n- every combined image-generation prompt is inside its own single fenced code block\n- no individual separate code blocks for Image Prompt 1, Image Prompt 2, or Image Prompt 3\n- Facebook page hashtags count is 3-5\n- no markdown tables\n- social post text is Bangla/Bengali script except URLs, hashtags, tool names, and allowed natural English terms\n- no English filler words or English-framed sentences\n- no words from the বদল family anywhere in generated Bangla social copy, title, topic, or visible Bangla image text\n- no invented facts, dates, releases, metrics, events, product features, testimonials, offers, or announcements\n- no generated image attachment placeholders\n- Image Prompt 1 follows the handwritten Bangla explainer/summary style\n- Image Prompt 2 follows the split poster style with text on one side and image/scene on the other\n- Image Prompt 3 is a realistic/editorial or concrete practical scene, not a default abstract visual\n- the three image prompts for each post are meaningfully different from each other\n\nUse this exact structure:\n\n# Sobar AI daily Bangla social drafts\nDate: [today's date]\nDay: [today's day]\n\n## Post 1: [Bangla title]\nTopic: [Bangla topic/theme]\n\n### Facebook page\n```text\n[Facebook page post content]\n```\n\n### Facebook group\n```text\n[Facebook group post content]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```\n\n## Post 2: [Bangla title]\nTopic: [Bangla topic/theme]\n\n### Facebook page\n```text\n[Facebook page post content]\n```\n\n### Facebook group\n```text\n[Facebook group post content]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```\n\n## Post 3: [Bangla title]\nTopic: [Bangla topic/theme]\n\n### Facebook page\n```text\n[Facebook page post content]\n```\n\n### Facebook group\n```text\n[Facebook group post content]\n```\n\n### Combined image prompt\n```text\nGenerate 3 separate downloadable images based on the prompts below:\n\nImage Prompt 1:\n[First self-contained image prompt]\n\nImage Prompt 2:\n[Second self-contained image prompt]\n\nImage Prompt 3:\n[Third self-contained image prompt]\n```"
