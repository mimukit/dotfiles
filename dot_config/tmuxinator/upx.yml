# /Users/mukit/.config/tmuxinator/upx.yml

name: system_updates
root: ~/
windows:
  - system_updates:
      layout: even-vertical
      panes:
        - brew_update:
            - clear
            - sh ~/setup_scripts/brew_apps_backup.sh
            - brewupx
        - topgrade:
            - clear
            - topgrade --disable containers --disable chezmoi --disable brew_formula --disable brew_cask --disable vim --yes
        - commands_sync:
            - clear
            - atuin sync
            - exit
